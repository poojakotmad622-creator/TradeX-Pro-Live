<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0f1a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
border-bottom:1px solid rgba(255,187,0,.2);
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffbb00;
}

.menu{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
transition:.3s;
}

.menu a:hover{
color:#ffbb00;
}

/* PAGE */

.container{
padding:40px 8%;
}

h1{
color:#ffb400;
margin-bottom:30px;
}

.box{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
margin-bottom:20px;
border:1px solid rgba(255,180,0,.15);
box-shadow:0 0 15px rgba(255,180,0,.08);
}

table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
}

th{
background:#ffb400;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.profit{
color:#00ff99;
}

.loss{
color:#ff4d4d;
}

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
}

.menu{
justify-content:center;
}

table{
font-size:14px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
TradeX Pro
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="market.html">Market</a>
<a href="portfolio.html">Portfolio</a>
<a href="history.html">History</a>
<a href="profile.html">Profile</a>
<a href="login.html">Logout</a>
</div>

</nav>

<div class="container">

<h1>📊 My Portfolio</h1>

<div class="box">
💰 Balance :
$<span id="balance">100000</span>
</div>

<div class="box">
📈 Total Investment :
$<span id="investment">0</span>
</div>

<div class="box">
💹 Portfolio Value :
$<span id="portfolioValue">0</span>
</div>

<div class="box">
🔥 Profit / Loss :
<span id="profitLoss">$0</span>
</div>

<table id="portfolioTable">

<thead>

<tr>
<th>Asset</th>
<th>Quantity</th>
<th>Buy Price</th>
<th>Current Value</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
