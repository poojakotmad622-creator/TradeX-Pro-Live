<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#0b0f1a;
color:white;
padding:40px;
font-family:Segoe UI;
}

h1{
color:#ffb400;
margin-bottom:30px;
}

.box{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
margin-bottom:25px;
border:1px solid rgba(255,180,0,.15);
}

table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
}

th{
background:#ffb400;
color:black;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.profit{
color:#00ff99;
}

.loss{
color:red;
}

</style>

</head>
<body>

<h1>📊 My Portfolio</h1>

<div class="box">
💰 Balance :
$<span id="balance">100000</span>
</div>

<div class="box">
📈 Total Investment :
$<span id="investment">0</span>
</div>

<div class="box">
💹 Portfolio Value :
$<span id="portfolioValue">0</span>
</div>

<div class="box">
🔥 Profit / Loss :
<span id="profitLoss">$0</span>
</div>

<table id="portfolioTable">

<thead>

<tr>

<th>Asset</th>

<th>Quantity</th>

<th>Buy Price</th>

<th>Current Value</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
