<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
border-bottom:1px solid rgba(255,187,0,.2);
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffbb00;
}

.menu{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
transition:.3s;
}

.menu a:hover{
color:#ffbb00;
}

/* PAGE */

.container{
padding:40px 8%;
}

h1{
color:#ffbb00;
margin-bottom:30px;
}

.box{
background:#111827;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(255,187,0,.15);
}

.buy{
color:#00ff99;
}

.sell{
color:#ff5252;
}

.time{
color:#aaa;
font-size:14px;
margin-top:10px;
}

.empty{
color:#aaa;
font-size:20px;
}

button{
padding:15px 30px;
background:#ff5252;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
font-size:16px;
}

button:hover{
opacity:.8;
}

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
}

.menu{
justify-content:center;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
TradeX Pro
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="market.html">Market</a>
<a href="portfolio.html">Portfolio</a>
<a href="history.html">History</a>
<a href="profile.html">Profile</a>
<a href="login.html">Logout</a>
</div>

</nav>

<div class="container">

<h1>📜 Transaction History</h1>

<div id="historyContainer"></div>

<button onclick="clearHistory()">
🗑 Clear History
</button>

</div>

<script>

let history =
JSON.parse(localStorage.getItem("history")) || [];

let container =
document.getElementById("historyContainer");

if(history.length === 0){

container.innerHTML =
"<p class='empty'>No transactions yet.</p>";

}

history.reverse().forEach(item=>{

container.innerHTML += `

<div class="box">

<h2 class="${item.type.toLowerCase()}">
${item.type} ${item.asset}
</h2>

<p>
Quantity : ${item.qty}
</p>

<p>
Price : $${item.price}
</p>

<div class="time">
${item.time || "Trade Completed Successfully"}
</div>

</div>

`;

});

function clearHistory(){

if(confirm("Delete all transaction history?")){

localStorage.removeItem("history");

location.reload();

}

}

</script>

</body>
</html>
