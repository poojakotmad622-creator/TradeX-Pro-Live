<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - TradeX Pro</title>

<style>
body{
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
}

.box{
background:#111827;
padding:30px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#ffb400;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

// SIMPLE FIXED ADMIN LOGIN
if(email === "admin@tradex.com" && password === "1234"){
    localStorage.setItem("adminLoggedIn", "true");
    window.location.href = "index.html"; // your admin panel page
}else{
    alert("Wrong credentials");
}

}
</script>

</body>
</html>
