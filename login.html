<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - TradeX Pro</title>

<style>
body{
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
}

.box{
background:#111827;
padding:30px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#ffb400;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>TradeX Pro Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
async function login(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if(!email || !password){
    alert("Please enter email and password");
    return;
}

try{

const response = await fetch(
"https://tradex-pro-live-production.up.railway.app/api/auth/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
});

const data = await response.json();

if(!response.ok){
    alert(data.message);
    return;
}

// Save JWT
localStorage.setItem("token", data.token);
localStorage.setItem("user", JSON.stringify(data.user));

// Redirect based on role
if(data.user.role === "admin"){
    window.location.href = "admin.html";
}else{
    window.location.href = "dashboard.html";
}

}catch(error){

console.error(error);
alert("Unable to connect to server");

}

}
</script>

</body>
</html>
