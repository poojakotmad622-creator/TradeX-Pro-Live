<!DOCTYPE html>
<html>
<head>
  <title>TradeX Admin</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
      display:flex;
    }

    .sidebar{
      width:220px;
      background:#111827;
      height:100vh;
      padding:20px;
    }

    .sidebar button{
      width:100%;
      margin-top:10px;
      padding:10px;
      background:#1f2937;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    .main{
      flex:1;
      padding:20px;
    }

    .card{
      background:#111827;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    input{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      background:#1f2937;
      color:white;
    }

    button{
      padding:8px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .danger{ background:red; color:white; }
    .ok{ background:green; color:white; }

    table{
      width:100%;
      margin-top:15px;
      border-collapse:collapse;
      background:#111827;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #222;
    }

    th{ background:#1f2937; }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Admin Panel</h3>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadDeposits()">Deposits</button>
  <button onclick="loadWithdrawals()">Withdrawals</button>
  <button onclick="loadWallets()">Wallets</button>
</div>

<div class="main">

  <div class="card">
    <h3>Stats</h3>
    <p>Total Users: <span id="totalUsers">0</span></p>
    <p>Total Balance: ₹<span id="totalBalance">0</span></p>
  </div>

  <div class="card">
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <button onclick="createUser()">Create</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <h3>Deposits</h3>
  <table>
    <tbody id="depositTable"></tbody>
  </table>

  <h3>Withdrawals</h3>
  <table>
    <tbody id="withdrawTable"></tbody>
  </table>

  <h3>Wallets</h3>
  <table>
    <tbody id="walletTable"></tbody>
  </table>

</div>

<script src="admin.js"></script>

</body>
</html>
