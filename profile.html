```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
border-bottom:1px solid rgba(255,187,0,.2);
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffbb00;
}

.menu{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
transition:.3s;
}

.menu a:hover{
color:#ffbb00;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.profile-card{
max-width:600px;
margin:auto;
background:#111827;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px rgba(255,187,0,.2);
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#ffbb00;
color:black;
font-size:50px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
margin-bottom:20px;
}

.name{
font-size:30px;
color:#ffbb00;
margin-bottom:10px;
}

.vip{
background:#ffbb00;
color:black;
display:inline-block;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
margin-bottom:25px;
}

.info{
margin-top:20px;
text-align:left;
line-height:2.5;
font-size:18px;
}

.box{
margin-top:25px;
background:#0b1220;
padding:20px;
border-radius:20px;
}

.box h2{
color:#ffbb00;
margin-bottom:10px;
}

.price{
font-size:38px;
font-weight:bold;
}

.logout{
margin-top:30px;
background:red;
color:white;
border:none;
padding:15px 30px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.logout:hover{
opacity:.8;
}

@media(max-width:768px){

nav{
flex-direction:column;
gap:15px;
}

.menu{
justify-content:center;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
TradeX Pro
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="market.html">Market</a>
<a href="portfolio.html">Portfolio</a>
<a href="history.html">History</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout()">Logout</a>
</div>

</nav>

<div class="container">

<div class="profile-card">

<div class="avatar" id="avatar">
P
</div>

<div class="name" id="userName">
User
</div>

<div class="vip">
⭐ VIP GOLD MEMBER
</div>

<div class="info">

📧 Email :
<span id="email">user@email.com</span>

<br>

🆔 Member ID :
TXP-847362

<br>

📅 Joined :
2026

<br>

📊 Total Assets :
<span id="assets">0</span>

<br>

📜 Transactions :
<span id="transactions">0</span>

</div>

<div class="box">

<h2>💰 Wallet Balance</h2>

<div class="price" id="balance">
$0
</div>

</div>

<div class="box">

<h2>📈 Portfolio Value</h2>

<div class="price" id="portfolioValue">
$0
</div>

</div>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>

<script>

const user =
JSON.parse(localStorage.getItem("user")) || {};

document.getElementById("userName").innerText =
user.name || "User";

document.getElementById("email").innerText =
user.email || "No Email";

document.getElementById("avatar").innerText =
(user.name ? user.name.charAt(0).toUpperCase() : "U");

let balance =
parseFloat(localStorage.getItem("balance")) || 100000;

let portfolio =
JSON.parse(localStorage.getItem("portfolio")) || [];

let history =
JSON.parse(localStorage.getItem("history")) || [];

document.getElementById("balance").innerHTML =
"$" + balance.toLocaleString();

document.getElementById("assets").innerHTML =
portfolio.length;

document.getElementById("transactions").innerHTML =
history.length;

let totalValue = 0;

portfolio.forEach(asset=>{
totalValue += asset.qty * asset.buyPrice;
});

document.getElementById("portfolioValue").innerHTML =
"$" + totalValue.toLocaleString();

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

window.location.href = "login.html";

}

</script>

</body>
</html>
